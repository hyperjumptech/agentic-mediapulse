name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/hyperjumptech/agentic-mediapulse:sha-${{ github.sha }}
            ghcr.io/hyperjumptech/agentic-mediapulse:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy
        uses: ./.github/actions/remote-deploy
        with:
          webhook-url: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          webhook-secret: ${{ secrets.COOLIFY_WEBHOOK_SECRET }}
          vpn-config-b64: ${{ secrets.OPENVPN_CONFIG_B64 }}
          vpn-password: ${{ secrets.OPENVPN_PASSWORD }}
